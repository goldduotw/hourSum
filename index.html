<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hour Sum</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Minimal additions to handle the new footer without touching your styles.css */
        body { flex-direction: column; overflow-y: auto; }
        footer { margin-top: 40px; text-align: center; }
        footer a { 
            color: #44aaff; 
            text-decoration: none; 
            font-size: 0.8rem; 
            margin: 0 10px; 
            opacity: 0.8;
        }
        footer a:hover { text-decoration: underline; opacity: 1; }
        .copyright { color: #555; font-size: 0.7rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="app">
        <input type="text" id="title-input" value="Time Lapsed">
        <div class="primary-timer" id="timer-display">00d : 00h : 00m</div>
        <div class="decimal-display" id="decimal-display">0.00 Total Hours</div>
        
        <div class="controls">
            <button id="start-btn" class="btn primary">START</button>
            <button id="pause-btn" class="btn secondary hidden">PAUSE</button>
            <button id="reset-btn" class="btn danger">RESET</button>
        </div>

        <div id="status-area" class="status-text"></div>

        <div class="extra-controls">
            <button id="pip-btn" class="btn link">DETACH (Pop Out)</button>
        </div>

        <footer>
            <a href="https://goldduo.com">Gold Duo Home</a>
            <a href="about.html">About</a>
            <a href="privacy.html">Privacy</a>
            <div class="copyright">&copy; 2026 Gold Duo Studio</div>
        </footer>
    </div>

    <!-- Padding canvas: creates the illusion of a smaller window -->
    <canvas id="pip-canvas" width="300" height="200" style="display:none;"></canvas>
    <video id="pip-video" autoplay muted style="display:none;"></video>

    <script src="script.js"></script>
</body>
</html>
