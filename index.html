<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hour Sum</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <input type="text" id="title-input" value="Time Lapsed">
        <div class="primary-timer" id="timer-display">00d : 00h : 00m</div>
        <div class="decimal-display" id="decimal-display">0.00 Total Hours</div>
        
        <div class="controls">
            <button id="start-btn" class="btn primary">START</button>
            <button id="pause-btn" class="btn secondary hidden">PAUSE</button>
            <button id="reset-btn" class="btn danger">RESET</button>
        </div>

        <div id="status-area" class="status-text"></div>

        <div class="extra-controls">
            <button id="pip-btn" class="btn link">DETACH (Pop Out)</button>
        </div>
    </div>

    <!-- Padding canvas: creates the illusion of a smaller window -->
    <canvas id="pip-canvas" width="300" height="200" style="display:none;"></canvas>
    <video id="pip-video" autoplay muted style="display:none;"></video>

    <script src="script.js"></script>
</body>
</html>
